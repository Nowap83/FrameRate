services:
  # PostgreSQL Database overrides for Production
  postgres:
    container_name: framerate_postgres_prod
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data

  # Redis Cache overrides for Production
  redis:
    container_name: framerate_redis_prod
    ports:
      - "6380:6379"
    volumes:
      - redis_data_prod:/data

  # Backend (Go) overrides for Production
  backend:
    container_name: framerate_backend_prod
    ports:
      - "8081:8080"
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis

  # Frontend (React + Vite + Nginx) overrides for Production
  frontend:
    container_name: framerate_frontend_prod
    ports:
      - "81:80"

volumes:
  # Separate volumes to avoid data collision with preprod
  postgres_data_prod:
    driver: local
  redis_data_prod:
    driver: local
