services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: ${ENV_PREFIX:-framerate}_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-framerate}
    ports:
      - "${HOST_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - framerate_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-framerate}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: ${ENV_PREFIX:-framerate}_redis
    ports:
      - "${HOST_REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - framerate_network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend (Go)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ${ENV_PREFIX:-framerate}_backend
    restart: always
    ports:
      - "${HOST_BACKEND_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - framerate_network

  # Frontend (React + Vite + Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
    container_name: ${ENV_PREFIX:-framerate}_frontend
    restart: always
    ports:
      - "${HOST_FRONTEND_PORT:-80}:80"
    environment:
      - BACKEND_HOST=${ENV_PREFIX:-framerate}_backend
    depends_on:
      - backend
    networks:
      - framerate_network

volumes:
  postgres_data:
    name: ${ENV_PREFIX:-framerate}_postgres_data
    driver: local
  redis_data:
    name: ${ENV_PREFIX:-framerate}_redis_data
    driver: local

networks:
  framerate_network:
    name: ${ENV_PREFIX:-framerate}_network
    driver: bridge
