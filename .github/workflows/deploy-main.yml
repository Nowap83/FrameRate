name: Main CI/CD Pipeline

on:
  push:
    branches:
      - main
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Backend Tests
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Run Backend Tests
        working-directory: ./backend
        run: go test -v ./...

      # Frontend Tests
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run Frontend Tests
        working-directory: ./frontend
        run: |
          npm ci
          npm run test:run

  deploy:
    name: Deploy to Proxmox LXC
    runs-on: ubuntu-latest
    needs: test # Only run if tests pass
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install cloudflared
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Setup SSH Context for Cloudflare
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # Configure SSH to use ProxyCommand via cloudflared to access the tunnel hostname
          # AddressFamily inet prevents the 'dial tcp: lookup *** on 127.0.0.53:53: server misbehaving' error on IPv6
          cat <<EOF > ~/.ssh/config
          Host $SSH_HOST
            ProxyCommand cloudflared access ssh --hostname %h
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            AddressFamily inet
          EOF

      - name: Deploy via SSH
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          DEPLOY_PATH: "/opt/main"
        run: |
          ssh $SSH_USER@$SSH_HOST "bash -s" << EOF
            # Create directory if it doesn't exist
            mkdir -p $DEPLOY_PATH
            cd $DEPLOY_PATH || exit 1
            
            # Initialize git if not already a repository
            if [ ! -d .git ]; then
              git init
              git remote add origin https://github.com/Nowap83/FrameRate.git
              git fetch origin main
              git checkout -f main
            else
              git fetch origin main
              git reset --hard origin/main
            fi

            # Handle .env file by copying it from preprod if it doesn't exist
            if [ ! -f .env ]; then
              echo "Copie du fichier .env depuis l'environnement preprod..."
              cp /opt/preprod/.env .env || touch .env
            fi

            # Add prod overrides to .env if not present
            grep -q "ENV_PREFIX=" .env || echo "ENV_PREFIX=main" >> .env
            grep -q "FRONTEND_PORT=" .env || echo "FRONTEND_PORT=81" >> .env
            grep -q "BACKEND_PORT=" .env || echo "BACKEND_PORT=8081" >> .env
            grep -q "POSTGRES_PORT=" .env || echo "POSTGRES_PORT=5433" >> .env
            grep -q "REDIS_PORT=" .env || echo "REDIS_PORT=6380" >> .env

            # Restart backend/frontend via Docker Compose
            docker compose down
            docker compose up -d --build
          EOF
